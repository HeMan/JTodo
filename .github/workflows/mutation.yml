name: Mutation Testing

on:
  workflow_dispatch:

jobs:
  mutation-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run mutation tests
        run: ./gradlew pitest

      - name: Upload PIT report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pitest-report
          path: build/reports/pitest/

      - name: Generate job summary
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import os

          report_path = "build/reports/pitest/mutations.xml"
          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")

          if not os.path.exists(report_path):
              with open(summary_file, "a") as f:
                  f.write("## Mutation Testing\n\n:warning: No mutation report found.\n")
              exit(0)

          tree = ET.parse(report_path)
          root = tree.getroot()
          mutations = root.findall("mutation")

          total = len(mutations)
          killed = sum(1 for m in mutations if m.attrib.get("status") == "KILLED")
          survived = [m for m in mutations if m.attrib.get("status") == "SURVIVED"]
          no_coverage = sum(1 for m in mutations if m.attrib.get("status") == "NO_COVERAGE")
          score = round(killed / total * 100, 1) if total > 0 else 0.0

          with open(summary_file, "a") as f:
              f.write("## Mutation Testing Report\n\n")

              # Score badge-style header
              if score >= 80:
                  badge = ":green_circle:"
              elif score >= 60:
                  badge = ":yellow_circle:"
              else:
                  badge = ":red_circle:"

              f.write(f"### {badge} Mutation Score: **{score}%**\n\n")

              # Summary table
              f.write("| Metric | Count |\n")
              f.write("|--------|-------|\n")
              f.write(f"| Total mutations | {total} |\n")
              f.write(f"| Killed | {killed} |\n")
              f.write(f"| Survived | {len(survived)} |\n")
              f.write(f"| No coverage | {no_coverage} |\n\n")

              # Survived mutations table
              if survived:
                  f.write("### Survived Mutations\n\n")
                  f.write("| Class | Method | Line | Mutator | Description |\n")
                  f.write("|-------|--------|------|---------|-------------|\n")
                  for m in survived:
                      mutated_class = m.findtext("mutatedClass", "").split(".")[-1]
                      method = m.findtext("mutatedMethod", "")
                      line = m.findtext("lineNumber", "")
                      mutator = m.findtext("mutator", "").split(".")[-1]
                      description = m.findtext("description", "")
                      f.write(f"| `{mutated_class}` | `{method}` | {line} | `{mutator}` | {description} |\n")
              else:
                  f.write(":tada: All mutations were killed!\n")
          EOF
